<!-- ════════════════════════════════════════════
     JAVASCRIPT — particles & animations
════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── STARS ── */
  const starsEl = document.getElementById('js-stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = (Math.random() * 2.4 + 0.5).toFixed(1);
    s.style.cssText = [
      `width:${size}px`,
      `height:${size}px`,
      `left:${(Math.random() * 100).toFixed(2)}%`,
      `top:${(Math.random() * 72).toFixed(2)}%`,
      `--min:${(Math.random() * 0.3 + 0.1).toFixed(2)}`,
      `--dur:${(Math.random() * 3 + 2).toFixed(1)}s`,
      `--delay:-${(Math.random() * 4).toFixed(1)}s`
    ].join(';');
    starsEl.appendChild(s);
  }

  /* ── FALLING GEMS ── */
  const GEM_SYMBOLS = ['💎','💠','🔷','🔵','💜','🔶','🔸','🟡','🟢','🔴','⭐','✨','🌟'];
  const GEM_COLORS  = ['#00BFFF','#BF5FFF','#FFD700','#00FF88','#FF3355','#ffffff'];
  const gemsEl = document.getElementById('js-gems');

  for (let i = 0; i < 28; i++) {
    const g = document.createElement('div');
    g.className = 'gem';
    g.textContent = GEM_SYMBOLS[Math.floor(Math.random() * GEM_SYMBOLS.length)];
    const color = GEM_COLORS[Math.floor(Math.random() * GEM_COLORS.length)];
    const size  = (Math.random() * 20 + 13).toFixed(0);
    g.style.cssText = [
      `left:${(Math.random() * 100).toFixed(2)}%`,
      `--size:${size}px`,
      `--glow:${color}`,
      `--fall-dur:${(Math.random() * 5 + 4).toFixed(1)}s`,
      `--fall-delay:-${(Math.random() * 9).toFixed(1)}s`
    ].join(';');
    gemsEl.appendChild(g);
  }

  /* ── EMBERS ── */
  const embersEl = document.getElementById('js-embers');
  for (let i = 0; i < 20; i++) {
    const e = document.createElement('div');
    e.className = 'ember';
    const size = (Math.random() * 4 + 2).toFixed(1);
    const tx   = ((Math.random() * 80) - 40).toFixed(0);
    e.style.cssText = [
      `width:${size}px`,
      `height:${size}px`,
      `left:${(Math.random() * 50 + 25).toFixed(2)}%`,
      `bottom:${(Math.random() * 9).toFixed(2)}%`,
      `--tx:${tx}px`,
      `--dur2:${(Math.random() * 3 + 2).toFixed(1)}s`,
      `--delay2:-${(Math.random() * 4).toFixed(1)}s`
    ].join(';');
    embersEl.appendChild(e);
  }

})();
</script>
